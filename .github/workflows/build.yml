name: Java CI with Maven

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven

    - name: Checkout MythicLib
      uses: actions/checkout@v4
      with:
        repository: lyminhthai2009/mythiclib-fixed
        path: mythiclib-fixed

    - name: Build and Install MythicLib
      run: |
        cd mythiclib-fixed
        mvn clean install -DskipTests
        cd ..

    - name: Install Dummy Parent POMs
      run: |
        # MMOInventory Parent POM
        echo '<?xml version="1.0" encoding="UTF-8"?><project xmlns="http://maven.apache.org/POM/4.0.0"><modelVersion>4.0.0</modelVersion><groupId>net.Indyuce</groupId><artifactId>MMOInventory</artifactId><version>2.0-SNAPSHOT</version><packaging>pom</packaging></project>' > dummy-inven.pom
        mvn install:install-file -Dfile=dummy-inven.pom -DpomFile=dummy-inven.pom -DgroupId=net.Indyuce -DartifactId=MMOInventory -Dversion=2.0-SNAPSHOT -Dpackaging=pom
        
        # MMOCore Parent POM (Installing both 1.12.1-SNAPSHOT and 1.13.1-SNAPSHOT to cover all dependencies)
        echo '<?xml version="1.0" encoding="UTF-8"?><project xmlns="http://maven.apache.org/POM/4.0.0"><modelVersion>4.0.0</modelVersion><groupId>net.Indyuce</groupId><artifactId>MMOCore</artifactId><version>1.12.1-SNAPSHOT</version><packaging>pom</packaging></project>' > dummy-core-12.pom
        mvn install:install-file -Dfile=dummy-core-12.pom -DpomFile=dummy-core-12.pom -DgroupId=net.Indyuce -DartifactId=MMOCore -Dversion=1.12.1-SNAPSHOT -Dpackaging=pom
        
        echo '<?xml version="1.0" encoding="UTF-8"?><project xmlns="http://maven.apache.org/POM/4.0.0"><modelVersion>4.0.0</modelVersion><groupId>net.Indyuce</groupId><artifactId>MMOCore</artifactId><version>1.13.1-SNAPSHOT</version><packaging>pom</packaging></project>' > dummy-core-13.pom
        mvn install:install-file -Dfile=dummy-core-13.pom -DpomFile=dummy-core-13.pom -DgroupId=net.Indyuce -DartifactId=MMOCore -Dversion=1.13.1-SNAPSHOT -Dpackaging=pom

    - name: Build with Maven
      run: mvn clean package -DskipTests

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MMOItems-JAR
        path: target/MMOItems-*.jar
